version: "3.9"

services:
  kraken-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: open-kraken/backend:dev
    container_name: kraken-backend
    ports:
      - "8080:8080"
    environment:
      OPEN_KRAKEN_HTTP_ADDR: "0.0.0.0:8080"
      OPEN_KRAKEN_APP_DATA_ROOT: /data
      OPEN_KRAKEN_WEB_DIST_DIR: /web/dist
      OPEN_KRAKEN_LOG_LEVEL: info
      # Browser on host:3000 calling API on host:8080 sends Origin http://localhost:3000
      OPEN_KRAKEN_WS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      OPEN_KRAKEN_SKILL_ROOT: /skills
    volumes:
      - kraken-data:/data
      - kraken-skills:/skills
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - kraken-net

  kraken-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: open-kraken/web:dev
    container_name: kraken-web
    ports:
      - "3000:3000"
    depends_on:
      kraken-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - kraken-net

  # Placeholder sidecars (health loop only). Replace with real agent binaries when ready.
  kraken-agent-node1:
    image: alpine:3.19
    container_name: kraken-agent-node1
    environment:
      KRAKEN_BACKEND_URL: http://kraken-backend:8080
      KRAKEN_NODE_ID: agent-node-1
      KRAKEN_DATA_DIR: /data
      KRAKEN_SKILLS_DIR: /skills
    volumes:
      - kraken-data:/data
      - kraken-skills:/skills
    depends_on:
      kraken-backend:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Agent node 1 started. Backend: $$KRAKEN_BACKEND_URL';
        while true; do
          wget -qO- $$KRAKEN_BACKEND_URL/healthz > /dev/null 2>&1 && echo '[node1] heartbeat ok' || echo '[node1] backend unreachable';
          sleep 30;
        done
      "
    restart: unless-stopped
    networks:
      - kraken-net

  kraken-agent-node2:
    image: alpine:3.19
    container_name: kraken-agent-node2
    environment:
      KRAKEN_BACKEND_URL: http://kraken-backend:8080
      KRAKEN_NODE_ID: agent-node-2
      KRAKEN_DATA_DIR: /data
      KRAKEN_SKILLS_DIR: /skills
    volumes:
      - kraken-data:/data
      - kraken-skills:/skills
    depends_on:
      kraken-backend:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Agent node 2 started. Backend: $$KRAKEN_BACKEND_URL';
        while true; do
          wget -qO- $$KRAKEN_BACKEND_URL/healthz > /dev/null 2>&1 && echo '[node2] heartbeat ok' || echo '[node2] backend unreachable';
          sleep 30;
        done
      "
    restart: unless-stopped
    networks:
      - kraken-net

volumes:
  kraken-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
  kraken-skills:
    driver: local

networks:
  kraken-net:
    driver: bridge
