apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kraken-agent-node
  namespace: kraken
  labels:
    app: kraken-agent-node
spec:
  selector:
    matchLabels:
      app: kraken-agent-node
  template:
    metadata:
      labels:
        app: kraken-agent-node
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: agent-node
          image: open-kraken/agent:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: kraken-config
          env:
            - name: KRAKEN_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: KRAKEN_LOG_LEVEL
              value: "info"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: skills
              mountPath: /skills
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command: ["test", "-f", "/tmp/agent-alive"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kraken-data-pvc
        - name: skills
          emptyDir: {}
