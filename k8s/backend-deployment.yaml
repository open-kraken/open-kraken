apiVersion: apps/v1
kind: Deployment
metadata:
  name: kraken-backend
  namespace: kraken
  labels:
    app: kraken-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kraken-backend
  template:
    metadata:
      labels:
        app: kraken-backend
    spec:
      containers:
        - name: backend
          image: open-kraken/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: kraken-config
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kraken-data-pvc
