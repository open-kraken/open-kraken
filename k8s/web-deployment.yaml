apiVersion: apps/v1
kind: Deployment
metadata:
  name: kraken-web
  namespace: kraken
  labels:
    app: kraken-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kraken-web
  template:
    metadata:
      labels:
        app: kraken-web
    spec:
      containers:
        - name: web
          image: open-kraken/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
