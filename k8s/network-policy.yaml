---
# Backend: allow ingress from web and agent nodes only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kraken-backend-netpol
  namespace: kraken
spec:
  podSelector:
    matchLabels:
      app: kraken-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from web frontend.
    - from:
        - podSelector:
            matchLabels:
              app: kraken-web
      ports:
        - protocol: TCP
          port: 8080
    # Allow traffic from agent nodes.
    - from:
        - podSelector:
            matchLabels:
              app: kraken-agent-node
      ports:
        - protocol: TCP
          port: 8080
    # Allow traffic from ingress controller.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS.
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow all outbound (backend may call external APIs).
    - to: []

---
# Web frontend: allow ingress from ingress controller only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kraken-web-netpol
  namespace: kraken
spec:
  podSelector:
    matchLabels:
      app: kraken-web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Allow DNS.
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow traffic to backend.
    - to:
        - podSelector:
            matchLabels:
              app: kraken-backend
      ports:
        - protocol: TCP
          port: 8080

---
# Agent nodes: allow egress to backend only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kraken-agent-netpol
  namespace: kraken
spec:
  podSelector:
    matchLabels:
      app: kraken-agent-node
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # Allow DNS.
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow traffic to backend.
    - to:
        - podSelector:
            matchLabels:
              app: kraken-backend
      ports:
        - protocol: TCP
          port: 8080
