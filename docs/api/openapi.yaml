openapi: 3.1.0
info:
  title: open-kraken HTTP API
  version: 0.1.0
  description: |
    Browser-facing HTTP contract for the open-kraken migration workspace.
    WebSocket handshake and event schemas are documented in x-websocket and in
    docs/api/http-websocket-contract.md.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Get backend runtime health and degraded dependency state
      responses:
        '200':
          description: Healthy or degraded runtime with optional warnings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealthResponse'
        '503':
          description: Unhealthy runtime with required dependency errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealthResponse'
  /api/v1/namespaces:
    get:
      operationId: listNamespaces
      summary: List namespaces
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived, all]
            default: all
        - name: q
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Namespace list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamespaceListResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'
    post:
      operationId: createNamespace
      summary: Create a namespace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNamespaceRequest'
      responses:
        '201':
          description: Created namespace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Namespace'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '409':
          $ref: '#/components/responses/Error409'
        '500':
          $ref: '#/components/responses/Error500'
  /api/v1/namespaces/{namespaceId}:
    get:
      operationId: getNamespace
      summary: Get a namespace
      parameters:
        - $ref: '#/components/parameters/NamespaceId'
      responses:
        '200':
          description: Namespace detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Namespace'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
    put:
      operationId: updateNamespace
      summary: Update namespace name and description
      parameters:
        - $ref: '#/components/parameters/NamespaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNamespaceRequest'
      responses:
        '200':
          description: Updated namespace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Namespace'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '500':
          $ref: '#/components/responses/Error500'
  /api/v1/namespaces/{namespaceId}/archive:
    post:
      operationId: archiveNamespace
      summary: Archive a namespace
      parameters:
        - $ref: '#/components/parameters/NamespaceId'
      responses:
        '200':
          description: Archived namespace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Namespace'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '500':
          $ref: '#/components/responses/Error500'
  /api/v1/namespaces/{namespaceId}/restore:
    post:
      operationId: restoreNamespace
      summary: Restore an archived namespace
      parameters:
        - $ref: '#/components/parameters/NamespaceId'
      responses:
        '200':
          description: Restored namespace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Namespace'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '500':
          $ref: '#/components/responses/Error500'
  /api/workspaces/{workspaceId}/chat/home:
    get:
      operationId: getChatHome
      summary: Get workspace chat home read model
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Chat home read model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatHomeResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
  /api/workspaces/{workspaceId}/conversations/{conversationId}/messages:
    get:
      operationId: listConversationMessages
      summary: List conversation messages
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/ConversationId'
        - name: before
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Message page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagePageResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
    post:
      operationId: createConversationMessage
      summary: Create a message in a conversation
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
      responses:
        '200':
          description: Persisted message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateMessageResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '422':
          $ref: '#/components/responses/Error422'
        '500':
          $ref: '#/components/responses/Error500'
  /api/workspaces/{workspaceId}/members:
    get:
      operationId: listMembers
      summary: List workspace members
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Member roster
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembersResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
  /api/workspaces/{workspaceId}/roles/matrix:
    get:
      operationId: getRoleMatrix
      summary: Get role capability matrix
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Role capability matrix
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleMatrixResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
  /api/workspaces/{workspaceId}/roadmap:
    get:
      operationId: getRoadmap
      summary: Get workspace roadmap
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Roadmap document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoadmapResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
    put:
      operationId: updateRoadmap
      summary: Replace workspace roadmap
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoadmapRequest'
      responses:
        '200':
          description: Updated roadmap document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoadmapResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '500':
          $ref: '#/components/responses/Error500'
  /api/workspaces/{workspaceId}/project-data:
    get:
      operationId: getProjectData
      summary: Get workspace project data
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Project data document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDataResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
    put:
      operationId: updateProjectData
      summary: Update workspace project data
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectDataRequest'
      responses:
        '200':
          description: Updated project data document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDataResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '500':
          $ref: '#/components/responses/Error500'
  /api/workspaces/{workspaceId}/terminals:
    get:
      operationId: listTerminals
      summary: List terminal sessions
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Terminal session summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTerminalsResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
    post:
      operationId: createTerminal
      summary: Create or reuse a terminal session
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTerminalRequest'
      responses:
        '200':
          description: Terminal session created or reused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTerminalResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '422':
          $ref: '#/components/responses/Error422'
        '500':
          $ref: '#/components/responses/Error500'
        '503':
          $ref: '#/components/responses/Error503'
  /api/workspaces/{workspaceId}/terminals/{terminalId}/dispatch:
    post:
      operationId: dispatchTerminalInput
      summary: Dispatch input or command text into a terminal lane
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/TerminalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminalDispatchRequest'
      responses:
        '200':
          description: Dispatch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalDispatchResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '422':
          $ref: '#/components/responses/Error422'
        '500':
          $ref: '#/components/responses/Error500'
        '503':
          $ref: '#/components/responses/Error503'
  /api/v1/skills:
    get:
      operationId: listSkills
      summary: List filesystem skill catalog entries
      responses:
        '200':
          description: Skill catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillListResponse'
        '500':
          $ref: '#/components/responses/Error500'
  /api/v1/skills/reload:
    post:
      operationId: reloadSkills
      summary: Rescan the filesystem skill catalog
      responses:
        '200':
          description: Reload result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillReloadResponse'
        '500':
          $ref: '#/components/responses/Error500'
  /api/v1/members/{memberId}/skills:
    get:
      operationId: listMemberSkills
      summary: List skills assigned to a member
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Member skill bindings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberSkillsResponse'
        '500':
          $ref: '#/components/responses/Error500'
    put:
      operationId: replaceMemberSkills
      summary: Replace the full skill binding list for a member
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceMemberSkillsRequest'
      responses:
        '200':
          description: Updated member skill bindings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberSkillsResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '500':
          $ref: '#/components/responses/Error500'
  /api/v1/tokens/events:
    post:
      operationId: recordTokenEvent
      summary: Record a token usage event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenEvent'
      responses:
        '201':
          description: Recorded token event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenEvent'
        '400':
          $ref: '#/components/responses/Error400'
  /api/v1/tokens/stats:
    get:
      operationId: getTokenStats
      summary: Get aggregate token usage statistics
      responses:
        '200':
          description: Token statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenStats'
        '500':
          $ref: '#/components/responses/Error500'
  /api/v1/tokens/activity:
    get:
      operationId: listTokenActivity
      summary: List recent token usage events
      responses:
        '200':
          description: Recent token events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenActivityResponse'
        '500':
          $ref: '#/components/responses/Error500'
components:
  parameters:
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
    NamespaceId:
      name: namespaceId
      in: path
      required: true
      schema:
        type: string
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
    TerminalId:
      name: terminalId
      in: path
      required: true
      schema:
        type: string
  responses:
    Error400:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              value:
                error:
                  code: auth.unauthorized
                  message: bearer token is missing or invalid
                  status: 401
                  requestId: req_01KN9B00000000000000000003
                  retryable: false
                  details:
                    workspaceId: ws_123
    Error403:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            forbiddenScope:
              value:
                error:
                  code: auth.capability_denied
                  message: member cannot dispatch to this terminal
                  status: 403
                  requestId: req_01KN9B00000000000000000004
                  retryable: false
                  details:
                    workspaceId: ws_123
                    memberId: member_member
                    requiredCapability: terminal.dispatch
    Error404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error409:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error422:
      description: Unprocessable entity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error500:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error503:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'
    ErrorBody:
      type: object
      required: [code, message, status, requestId, retryable]
      properties:
        code:
          type: string
        message:
          type: string
        status:
          type: integer
        requestId:
          type: string
        retryable:
          type: boolean
        details:
          type: object
          additionalProperties: true
    Workspace:
      type: object
      required: [id, name, rootPath, readOnly]
      properties:
        id:
          type: string
        name:
          type: string
        rootPath:
          type: string
        readOnly:
          type: boolean
    Namespace:
      type: object
      required: [id, name, slug, description, status, team_count, member_count, created_at, updated_at]
      properties:
        id:
          type: string
          pattern: '^ns_[A-Za-z0-9]+'
        name:
          type: string
          minLength: 1
          maxLength: 64
        slug:
          type: string
          pattern: '^[a-z0-9-]+$'
          maxLength: 48
        description:
          type: string
          maxLength: 256
        status:
          type: string
          enum: [active, archived]
        team_count:
          type: integer
          minimum: 0
        member_count:
          type: integer
          minimum: 0
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    NamespaceListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Namespace'
        total:
          type: integer
          minimum: 0
    CreateNamespaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        description:
          type: string
          maxLength: 256
    UpdateNamespaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        description:
          type: string
          maxLength: 256
        slug:
          type: string
          description: Read-only after creation; updates fail with 400 when changed.
    Member:
      type: object
      required: [workspaceId, memberId, displayName, avatar, roleType, manualStatus, terminalStatus]
      properties:
        workspaceId:
          type: string
        memberId:
          type: string
        displayName:
          type: string
        avatar:
          type: string
        roleType:
          type: string
          enum: [owner, supervisor, assistant, member]
        manualStatus:
          type: string
        terminalStatus:
          type: string
    Conversation:
      type: object
      required: [id, type, memberIds, pinned, muted]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [channel, dm]
        memberIds:
          type: array
          items:
            type: string
        customName:
          type: string
        pinned:
          type: boolean
        muted:
          type: boolean
        lastMessageAt:
          type: integer
          format: int64
        lastMessagePreview:
          type: string
        isDefault:
          type: boolean
        unreadCount:
          type: integer
    MessageContent:
      type: object
      required: [type]
      properties:
        type:
          type: string
        text:
          type: string
    MessageAttachment:
      type: object
      required: [type]
      properties:
        type:
          type: string
        title:
          type: string
        roadmapId:
          type: string
        taskId:
          type: string
    Message:
      type: object
      required: [id, content, createdAt, isAi, status]
      properties:
        id:
          type: string
        senderId:
          type: string
        content:
          $ref: '#/components/schemas/MessageContent'
        createdAt:
          type: integer
          format: int64
        isAi:
          type: boolean
        status:
          $ref: '#/components/schemas/MessageStatus'
        attachment:
          $ref: '#/components/schemas/MessageAttachment'
    MessageStatus:
      type: string
      enum: [pending, sent, failed]
      description: |
        pending = persisted but downstream delivery or side effects still settling.
        sent = persisted and accepted by the current downstream path.
        failed = persisted but downstream delivery or side effects failed.
    PersistenceState:
      type: object
      required: [storage]
      properties:
        storage:
          type: string
          enum: [workspace, app, none]
        warning:
          type: [string, 'null']
        error:
          oneOf:
            - $ref: '#/components/schemas/ErrorBody'
            - type: 'null'
    RuntimeDetail:
      type: object
      required: [name, reason]
      properties:
        name:
          type: string
        reason:
          type: string
    RuntimeHealthResponse:
      type: object
      required: [status, service, requestId]
      properties:
        status:
          type: string
          enum: [ok, degraded, unhealthy]
        service:
          type: string
        requestId:
          type: string
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeDetail'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeDetail'
    RecoveryState:
      type: object
      required: [mode, resyncRequired, terminalReplay, dedupeKey]
      properties:
        mode:
          type: string
          enum: [snapshot, replay, snapshot_resync]
