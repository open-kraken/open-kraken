x-websocket:
  endpoint: /api/ws
  handshake:
    auth:
      type: bearer
      header: Authorization
    query:
      workspaceId:
        type: string
        required: true
      memberId:
        type: string
        required: true
      subscriptions:
        type: string
        description: Optional comma-separated subscription family list. Supported values are chat, members, roadmap, and terminal; unsupported values reject the handshake.
        example: chat,members,roadmap,terminal
      cursor:
        type: string
      conversationId:
        type: array
        items:
          type: string
      terminalId:
        type: array
        description: Optional terminal session filters. These apply only when the terminal subscription family is enabled.
        items:
          type: string
    accept:
      type: object
      required: [type, workspaceId, memberId, subscriptionScope, mode, cursor, resyncRequired, recovery, heartbeatIntervalMs]
      properties:
        type:
          type: string
          const: handshake.accepted
        workspaceId:
          type: string
        memberId:
          type: string
        subscriptionScope:
          type: object
          additionalProperties: true
        mode:
          type: string
          enum: [snapshot, replay]
        cursor:
          type: string
        replayFromCursor:
          type: string
        resyncRequired:
          type: boolean
        recovery:
          $ref: '#/components/schemas/RecoveryState'
        heartbeatIntervalMs:
          type: integer
    reject:
      type: object
      required: [type, error]
      properties:
        type:
          type: string
          const: handshake.rejected
        error:
          $ref: '#/components/schemas/ErrorBody'
  events:
    chat.snapshot:
      $ref: '#/components/schemas/RealtimeChatSnapshotPayload'
    chat.delta:
      $ref: '#/components/schemas/RealtimeChatDeltaPayload'
    chat.status:
      $ref: '#/components/schemas/RealtimeChatStatusPayload'
    presence.snapshot:
      $ref: '#/components/schemas/RealtimePresenceSnapshotPayload'
    presence.updated:
      $ref: '#/components/schemas/RealtimePresenceUpdatedPayload'
    roadmap.snapshot:
      $ref: '#/components/schemas/RealtimeRoadmapSnapshotPayload'
    roadmap.updated:
      $ref: '#/components/schemas/RealtimeRoadmapUpdatedPayload'
    terminal.attach:
      $ref: '#/components/schemas/RealtimeTerminalAttachPayload'
    terminal.snapshot:
      $ref: '#/components/schemas/RealtimeTerminalSnapshotPayload'
    terminal.delta:
      $ref: '#/components/schemas/RealtimeTerminalDeltaPayload'
    terminal.status:
      $ref: '#/components/schemas/RealtimeTerminalStatusPayload'
